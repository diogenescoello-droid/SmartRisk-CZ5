<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SmartRisk CZ5</title><link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="login" class="login-shell">
  <section class="login-card">
    <div class="brand-mark">SR</div>
    <h1>SmartRisk CZ5</h1>
    <p>Seguimiento territorial de gestión de riesgos</p>
    <form id="loginForm">
      <label for="email">Correo</label><input id="email" type="email" autocomplete="username" required>
      <label for="password">Contraseña</label><input id="password" type="password" autocomplete="current-password" required>
      <button>Ingresar</button><div id="loginError" class="error" role="alert"></div>
    </form>
    <button id="showRecovery" class="link-button" type="button">¿Olvidaste tu contraseña?</button>
    <small>Acceso seguro para usuarios autorizados de la Coordinación Zonal 5.</small>
  </section>
</div>
<div id="app" class="app hidden">
  <aside>
    <div class="brand"><b>SmartRisk</b><span>CZ5 · v1.0 MVP</span></div>
    <nav id="nav"></nav>
    <button id="logout" class="logout">Cerrar sesión</button>
  </aside>
  <main>
    <header>
      <div><h2 id="pageTitle">Panel principal</h2><p id="pageSubtitle">Estado operativo de la plataforma</p></div>
      <div class="account-menu"><span id="syncStatus" class="sync-status local">Modo local</span><span id="sessionUser" class="pill"></span><button id="changePassword" class="secondary">Cambiar contraseña</button></div>
    </header>
    <section id="content"></section>
  </main>
</div>
<button id="guideHelp" class="guide-help hidden" type="button" aria-label="Abrir guía de esta pantalla">?</button>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script><script src="data.js"></script><script src="enos-data.js"></script><script src="enos-reviews.js"></script><script src="app.js"></script>
</body></html>
