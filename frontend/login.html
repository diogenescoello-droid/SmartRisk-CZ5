<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Acceso · SmartRisk CZ5</title>
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="auth-brand">
      <span class="auth-mark">SR</span>
      <div>
        <h1>SmartRisk CZ5</h1>
        <p>Acceso institucional</p>
      </div>
    </div>

    <form id="login-form" class="auth-form">
      <div class="auth-field">
        <label for="identity">Funcionario</label>
        <select id="identity" required autocomplete="username">
          <option value="">Seleccione su nombre y apellido</option>
        </select>
        <small id="user-detail" class="auth-help">Seleccione el perfil institucional con el que desea ingresar.</small>
      </div>

      <div class="auth-field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" required autocomplete="current-password" value="1234">
      </div>

      <div id="login-message" class="auth-message" hidden></div>

      <div class="auth-actions">
        <button class="auth-button" type="submit">Ingresar</button>
        <a class="auth-link" href="recover-password.html">¿Olvidaste tu contraseña?</a>
      </div>
    </form>

    <div class="demo-accounts">
      <strong>Prueba:</strong> seleccione un funcionario y use la clave temporal <strong>1234</strong>.
    </div>
  </main>

  <script src="assets/js/core/constants.js"></script>
  <script src="assets/js/core/storage.js"></script>
  <script src="assets/js/data/users-demo.js"></script>
  <script src="assets/js/services/user-context.js"></script>
  <script src="assets/js/services/auth-service.js"></script>
  <script>
    if (SmartRisk.UserContext.current()) location.replace('index.html');

    const identity = document.getElementById('identity');
    const userDetail = document.getElementById('user-detail');
    const users = SmartRisk.UserContext.users()
      .filter(user => user.status !== 'inactive')
      .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'es'));

    users.forEach(user => {
      const option = document.createElement('option');
      option.value = user.id;
      option.textContent = user.name;
      option.dataset.detail = [user.position, user.institution, user.role].filter(Boolean).join(' · ');
      identity.appendChild(option);
    });

    identity.addEventListener('change', () => {
      const option = identity.options[identity.selectedIndex];
      userDetail.textContent = option?.dataset?.detail || 'Seleccione el perfil institucional con el que desea ingresar.';
    });

    document.getElementById('login-form').addEventListener('submit', event => {
      event.preventDefault();
      const result = SmartRisk.AuthService.login(
        identity.value,
        document.getElementById('password').value
      );
      const box = document.getElementById('login-message');

      if (!result.ok) {
        box.hidden = false;
        box.className = 'auth-message is-error';
        box.textContent = result.message;
        return;
      }

      location.replace(result.mustChangePassword ? 'change-password.html' : 'index.html');
    });
  </script>
</body>
</html>
