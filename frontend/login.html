<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acceso · SmartRisk CZ5</title><link rel="stylesheet" href="assets/css/auth.css"></head><body class="auth-page"><main class="auth-card"><div class="auth-brand"><span class="auth-mark">SR</span><div><h1>SmartRisk CZ5</h1><p>Acceso institucional</p></div></div><form id="login-form" class="auth-form"><div class="auth-field"><label for="email">Correo</label><input id="email" type="email" required autocomplete="username" value="admin@smartrisk.local"></div><div class="auth-field"><label for="password">Contraseña</label><input id="password" type="password" required autocomplete="current-password" value="1234"></div><div id="login-message" class="auth-message" hidden></div><div class="auth-actions"><button class="auth-button" type="submit">Ingresar</button><a class="auth-link" href="recover-password.html">¿Olvidaste tu contraseña?</a></div></form><div class="demo-accounts"><strong>Prueba:</strong> admin@smartrisk.local · clave 1234</div></main><script src="assets/js/core/constants.js"></script><script src="assets/js/core/storage.js"></script><script src="assets/js/data/users-demo.js"></script><script src="assets/js/services/user-context.js"></script><script src="assets/js/services/auth-service.js"></script><script>if(SmartRisk.UserContext.current())location.replace('index.html');document.getElementById('login-form').addEventListener('submit',e=>{e.preventDefault();const result=SmartRisk.AuthService.login(document.getElementById('email').value,document.getElementById('password').value);const box=document.getElementById('login-message');if(!result.ok){box.hidden=false;box.className='auth-message is-error';box.textContent=result.message;return}location.replace(result.mustChangePassword?'change-password.html':'index.html')});</script></body></html>
