<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recuperar acceso · SmartRisk</title><link rel="stylesheet" href="assets/css/auth.css"></head><body class="auth-page"><main class="auth-card"><div class="auth-brand"><span class="auth-mark">SR</span><div><h1>Recuperar acceso</h1><p>En R03 el envío por correo está simulado.</p></div></div><form id="request-form" class="auth-form"><div class="auth-field"><label>Correo registrado</label><input id="email" type="email" required></div><button class="auth-button">Generar código</button></form><form id="reset-form" class="auth-form" hidden><div id="demo-code" class="auth-message"></div><div class="auth-field"><label>Código</label><input id="code" required></div><div class="auth-field"><label>Nueva contraseña</label><input id="new-password" type="password" minlength="8" required></div><div class="auth-field"><label>Confirmar contraseña</label><input id="confirm-password" type="password" minlength="8" required></div><div id="message" class="auth-message" hidden></div><button class="auth-button">Restablecer contraseña</button></form><div class="auth-actions"><a class="auth-link" href="login.html">Volver al acceso</a></div></main><script src="assets/js/core/constants.js"></script><script src="assets/js/core/storage.js"></script><script src="assets/js/data/users-demo.js"></script><script src="assets/js/services/user-context.js"></script><script src="assets/js/services/auth-service.js"></script><script>const email=document.getElementById('email');document.getElementById('request-form').addEventListener('submit',e=>{e.preventDefault();const result=SmartRisk.AuthService.requestRecovery(email.value);document.getElementById('request-form').hidden=true;document.getElementById('reset-form').hidden=false;document.getElementById('demo-code').textContent=result.demoCode?'Código de prueba: '+result.demoCode:result.message});document.getElementById('reset-form').addEventListener('submit',e=>{e.preventDefault();const result=SmartRisk.AuthService.resetPassword({email:email.value,code:document.getElementById('code').value,newPassword:document.getElementById('new-password').value,confirmPassword:document.getElementById('confirm-password').value});const box=document.getElementById('message');box.hidden=false;box.className='auth-message'+(result.ok?'':' is-error');box.textContent=result.ok?'Contraseña restablecida. Ya puedes ingresar.':result.message});</script></body></html>
