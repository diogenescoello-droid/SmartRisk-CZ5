<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cambiar contraseña · SmartRisk</title><link rel="stylesheet" href="assets/css/auth.css"></head><body class="auth-page"><main class="auth-card"><div class="auth-brand"><span class="auth-mark">SR</span><div><h1>Cambiar contraseña</h1><p>Define una clave personal de al menos 8 caracteres.</p></div></div><form id="password-form" class="auth-form"><div class="auth-field"><label>Contraseña actual</label><input id="current-password" type="password" required></div><div class="auth-field"><label>Nueva contraseña</label><input id="new-password" type="password" minlength="8" required></div><div class="auth-field"><label>Confirmar contraseña</label><input id="confirm-password" type="password" minlength="8" required></div><div id="message" class="auth-message" hidden></div><div class="auth-actions"><button class="auth-button">Guardar contraseña</button><a class="auth-link" href="index.html">Volver</a></div></form></main><script src="assets/js/core/constants.js"></script><script src="assets/js/core/storage.js"></script><script src="assets/js/data/users-demo.js"></script><script src="assets/js/services/user-context.js"></script><script src="assets/js/services/auth-service.js"></script><script>if(!SmartRisk.UserContext.current())location.replace('login.html');document.getElementById('password-form').addEventListener('submit',e=>{e.preventDefault();const result=SmartRisk.AuthService.changePassword({currentPassword:document.getElementById('current-password').value,newPassword:document.getElementById('new-password').value,confirmPassword:document.getElementById('confirm-password').value});const box=document.getElementById('message');box.hidden=false;box.className='auth-message'+(result.ok?'':' is-error');box.textContent=result.ok?'Contraseña actualizada. Redirigiendo…':result.message;if(result.ok)setTimeout(()=>location.replace('index.html'),600)});</script></body></html>
