<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cambiar contraseña · SmartRisk CZ5</title><link rel="stylesheet" href="assets/css/variables.css"><link rel="stylesheet" href="assets/css/base.css"><link rel="stylesheet" href="assets/css/components.css"><link rel="stylesheet" href="assets/css/auth.css"></head><body class="auth-page"><main class="auth-shell"><section class="auth-brand-panel"><div class="auth-brand-mark">SR</div><span class="kicker">Seguridad de la cuenta</span><h1>Protege tu acceso institucional</h1><p>La contraseña es personal. Los administradores pueden restablecer el acceso, pero no consultar tu clave.</p></section><section class="auth-card"><div><span class="kicker">SmartRisk CZ5</span><h2>Crear contraseña personal</h2><p id="change-intro" class="muted">Actualiza tu contraseña.</p></div><form id="change-form" class="auth-form"><label class="form-field"><span class="form-label">Contraseña actual</span><input id="current-password" class="form-input" type="password" value="1234" autocomplete="current-password" required></label><label class="form-field"><span class="form-label">Nueva contraseña</span><input id="new-password" class="form-input" type="password" minlength="8" autocomplete="new-password" required><small class="password-rules">Mínimo 8 caracteres.</small></label><label class="form-field"><span class="form-label">Confirmar nueva contraseña</span><input id="confirm-password" class="form-input" type="password" minlength="8" autocomplete="new-password" required></label><p id="change-error" class="auth-error" role="alert" hidden></p><button class="btn btn-primary auth-submit" type="submit">Guardar contraseña</button></form></section></main><script src="assets/js/core/constants.js"></script><script src="assets/js/core/storage.js"></script><script src="assets/js/data/users-demo.js"></script><script src="assets/js/services/permission-service.js"></script><script src="assets/js/services/user-context.js"></script><script src="assets/js/services/auth-service.js"></script><script>if(!SmartRisk.UserContext.requireSession())throw new Error("Sesión requerida");const params=new URLSearchParams(location.search),required=params.get("required")==="1",next=params.get("next")||"index.html#/territorios";document.getElementById("change-intro").textContent=required?"Por seguridad, debes sustituir la contraseña temporal antes de continuar.":"Introduce tu contraseña actual y define una nueva clave personal.";document.getElementById("change-form").onsubmit=e=>{e.preventDefault();const result=SmartRisk.AuthService.changePassword({currentPassword:document.getElementById("current-password").value,newPassword:document.getElementById("new-password").value,confirmPassword:document.getElementById("confirm-password").value}),error=document.getElementById("change-error");if(!result.ok){error.textContent=result.message;error.hidden=false;return}location.replace(next);};</script></body></html>
