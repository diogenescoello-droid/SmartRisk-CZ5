name: Publicar SmartRisk CZ5

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Desactivar Jekyll
        run: touch web-release/.nojekyll

      - name: Cargar versión actual
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-release

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
