name: Publicar SmartRisk CZ5

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar versión web actual
        run: |
          mkdir -p _site
          cp index.html _site/
          cp styles.css _site/
          cp app.js _site/
          cp data.js _site/
          cp firebase-config.js _site/
          cp 404.html _site/
          touch _site/.nojekyll

      - name: Cargar versión web
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4